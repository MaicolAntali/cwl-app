<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debug</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  body { background: #111; color: #eee; font-family: monospace; padding: 20px; }
  pre  { background: #222; padding: 12px; border-radius: 8px; word-break: break-all; white-space: pre-wrap; font-size: 13px; }
  h2   { color: #f0a500; }
</style>
</head>
<body>
<h2>Telegram WebApp Debug</h2>

<h3>window.Telegram exists?</h3>
<pre id="tg_exists">checking...</pre>

<h3>initData</h3>
<pre id="init_data">checking...</pre>

<h3>initDataUnsafe</h3>
<pre id="init_unsafe">checking...</pre>

<h3>User</h3>
<pre id="user">checking...</pre>

<script>
var tg = window.Telegram && window.Telegram.WebApp;

document.getElementById('tg_exists').textContent = tg ? 'YES' : 'NO';

if (tg) {
  tg.ready();
  tg.expand();
  document.getElementById('init_data').textContent    = tg.initData    || '(empty string)';
  document.getElementById('init_unsafe').textContent  = JSON.stringify(tg.initDataUnsafe, null, 2) || '(empty)';

  var user = tg.initDataUnsafe && tg.initDataUnsafe.user;
  document.getElementById('user').textContent = user
    ? 'username: @' + (user.username || 'NO USERNAME') + '\nid: ' + user.id + '\nfirst_name: ' + user.first_name
    : '(no user object)';
} else {
  document.getElementById('init_data').textContent   = 'N/A';
  document.getElementById('init_unsafe').textContent = 'N/A';
  document.getElementById('user').textContent        = 'N/A';
}
</script>
</body>
</html>
