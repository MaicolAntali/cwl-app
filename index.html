<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CWL</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  body { background:#111; color:#eee; font-family:sans-serif; padding:20px; }
  pre  { background:#222; padding:12px; border-radius:8px; word-break:break-all; white-space:pre-wrap; font-size:13px; }
  h3   { color:#f0a500; margin-top:20px; }
  .account { background:#1e1e1e; border:1px solid #333; border-radius:8px; padding:12px; margin-bottom:10px; }
  .tag { font-family:monospace; color:#888; font-size:12px; }
</style>
</head>
<body>

<h3>User</h3>
<pre id="user">loading...</pre>

<h3>Accounts</h3>
<div id="accounts">loading...</div>

<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbyrBz1SWGxoBl2YrNPoHqPtz9PpWsgfKMtY1mMnULHclXmobnoJlS_WixC08Gv47tZM/exec';

var tg = window.Telegram && window.Telegram.WebApp;
if (tg) { tg.ready(); tg.expand(); }

var username = tg && tg.initDataUnsafe && tg.initDataUnsafe.user
  ? tg.initDataUnsafe.user.username
  : null;

document.getElementById('user').textContent = username
  ? '@' + username
  : '(no user — not opened from Telegram?)';

if (username) {
  fetch(GAS_URL + '?action=getAccounts&username=' + encodeURIComponent(username))
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (!res.ok) {
        document.getElementById('accounts').textContent = 'Error: ' + res.error;
        return;
      }
      var html = '';
      res.accounts.forEach(function(p) {
        html += '<div class="account">' +
          '<b>' + p.playerName + '</b> &nbsp; TH' + p.thLevel +
          '<br><span class="tag">' + p.tag + '</span>' +
          '<br><small>' + (p.clanName || 'No clan') + '</small>' +
          '</div>';
      });
      document.getElementById('accounts').innerHTML = html || '<p>No accounts found.</p>';
    })
    .catch(function(e) {
      document.getElementById('accounts').textContent = 'Network error: ' + e.message;
    });
}
</script>
</body>
</html>
